<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clara & Tommaso</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: white;
      font-family: Georgia, "Times New Roman", serif;
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid #e8e0d8;
      backdrop-filter: blur(10px);
    }

    .site-nav a {
      color: #4a3a30;
      font-size: 15px;
      line-height: 1;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0;
      padding: 10px 14px;
      border-radius: 999px;
    }

    .site-nav a:hover,
    .site-nav a[aria-current="page"] {
      background: #efe7dd;
    }

    .image-container {
      min-height: calc(100vh - 58px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    img {
      max-width: 100%;
      max-height: calc(100vh - 58px);
      width: auto;
      height: auto;
      display: block;
    }

    @media (max-width: 600px) {
      .site-nav {
        gap: 4px;
        padding: 8px;
      }

      .site-nav a {
        font-size: 12px;
        padding: 8px 9px;
      }

      .image-container {
        display: block;
        min-height: 0;
        width: 100%;
      }

      img {
        width: 100%;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <a href="index.html" aria-current="page">Home</a>
    <a href="details.html">Details</a>
    <a href="rsvp.html">RSVP</a>
    <a href="gifts.html">Gifts</a>
  </nav>

  <main class="image-container">
    <img src="invite.png" alt="Invite" />
  </main>
</body>
</html>
