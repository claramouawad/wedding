<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clara & Tommaso</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: white;
      font-family: Georgia, "Times New Roman", serif;
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid #e8e0d8;
      backdrop-filter: blur(10px);
    }

    .site-nav a {
      color: #4a3a30;
      font-size: 15px;
      line-height: 1;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0;
      padding: 10px 14px;
      border-radius: 999px;
    }

    .site-nav a:hover,
    .site-nav a[aria-current="page"] {
      background: #efe7dd;
    }

    .language-switch {
      display: inline-flex;
      gap: 4px;
      margin-left: 12px;
    }

    .nav-separator {
      margin-left: 14px;
      color: #b9aa9b;
      line-height: 35px;
    }

    .language-switch button {
      color: #4a3a30;
      font: inherit;
      font-size: 15px;
      line-height: 1;
      text-transform: uppercase;
      padding: 10px 12px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
    }

    .language-switch button[aria-pressed="true"],
    .language-switch button:hover {
      background: #efe7dd;
    }

    .image-container {
      min-height: calc(100vh - 58px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    img {
      max-width: 100%;
      max-height: calc(100vh - 58px);
      width: auto;
      height: auto;
      display: block;
    }

    @media (max-width: 600px) {
      .site-nav {
        gap: 3px;
        padding: 8px 6px;
      }

      .site-nav a {
        font-size: 12px;
        padding: 8px 7px;
      }

      .language-switch button {
        font-size: 12px;
        padding: 8px 6px;
      }

      .language-switch {
        margin-left: 2px;
      }

      .nav-separator {
        margin-left: 3px;
        line-height: 28px;
      }

      .image-container {
        display: block;
        min-height: 0;
        width: 100%;
      }

      img {
        width: 100%;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <a href="index.html" aria-current="page" data-i18n="navHome">Home</a>
    <a href="details.html" data-i18n="navDetails">Details</a>
    <a href="rsvp.html">RSVP</a>
    <a href="gifts.html" data-i18n="navGifts">Gifts</a>
    <span class="nav-separator" aria-hidden="true">|</span>
    <span class="language-switch" aria-label="Language">
      <button type="button" data-lang="en" aria-pressed="true">🇬🇧 EN</button>
      <button type="button" data-lang="it" aria-pressed="false">🇮🇹 IT</button>
    </span>
  </nav>

  <main class="image-container">
    <img src="invite.png" alt="Invite" data-i18n-alt="homeImageAlt" />
  </main>
  <script>
    const translations = {
      en: {
        navHome: "Home",
        navDetails: "Details",
        navGifts: "Gifts",
        homeImageAlt: "Invite"
      },
      it: {
        navHome: "Home",
        navDetails: "Dettagli",
        navGifts: "Regali",
        homeImageAlt: "Invito"
      }
    };

    function applyLanguage(language) {
      const copy = translations[language] || translations.en;
      document.documentElement.lang = language;
      document.querySelectorAll("[data-i18n]").forEach((element) => {
        element.textContent = copy[element.dataset.i18n];
      });
      document.querySelectorAll("[data-i18n-alt]").forEach((element) => {
        element.alt = copy[element.dataset.i18nAlt];
      });
      document.querySelector(".image-container img").src = language === "it" ? "invito.png" : "invite.png";
      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.lang === language));
      });
      localStorage.setItem("weddingLanguage", language);
    }

    document.querySelectorAll("[data-lang]").forEach((button) => {
      button.addEventListener("click", () => applyLanguage(button.dataset.lang));
    });

    const params = new URLSearchParams(window.location.search);

    const language =
      params.get("lang") ||
      localStorage.getItem("weddingLanguage") ||
      "en";

    applyLanguage(language);
  </script>
</body>
</html>
