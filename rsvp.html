<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP | Clara & Tommaso</title>

  

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: white url("background.png") top center / 100% auto repeat-y;
      color: #4a3a30;
      font-family: Georgia, "Times New Roman", serif;
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid #e8e0d8;
      backdrop-filter: blur(10px);
    }

    .site-nav a {
      color: #4a3a30;
      font-size: 15px;
      line-height: 1;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0;
      padding: 10px 14px;
      border-radius: 999px;
    }

    .site-nav a:hover,
    .site-nav a[aria-current="page"] {
      background: #efe7dd;
    }

    .language-switch {
      display: inline-flex;
      gap: 4px;
      margin-left: 12px;
    }

    .nav-separator {
      margin-left: 14px;
      color: #b9aa9b;
      line-height: 35px;
    }

    .language-switch button {
      color: #4a3a30;
      font: inherit;
      font-size: 15px;
      line-height: 1;
      text-transform: uppercase;
      padding: 10px 12px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
    }

    .language-switch button[aria-pressed="true"],
    .language-switch button:hover {
      background: #efe7dd;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 42px;
      font-weight: 400;
      line-height: 1.1;
    }

    p {
      margin: 0 auto 28px;
      max-width: 520px;
      font-size: 20px;
      line-height: 1.5;
    }

    .rsvp-form {
      display: grid;
      gap: 24px;
      max-width: 600px;
      margin: 0 auto;
      text-align: left;
    }

    .guest-section {
      display: grid;
      gap: 18px;
      padding: 22px;
      border: 1px solid rgba(217, 207, 195, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.48);
    }

    .guest-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .guest-header h2 {
      margin: 0;
      font-size: 24px;
      font-weight: 400;
      line-height: 1.2;
    }

    .remove-guest {
      color: #4a3a30;
      font: inherit;
      font-size: 14px;
      border: 0;
      background: transparent;
      cursor: pointer;
      text-decoration: underline;
    }

    label,
    legend {
      display: block;
      margin-bottom: 8px;
      font-size: 17px;
      line-height: 1.4;
    }

    fieldset {
      margin: 0;
      padding: 0;
      border: 0;
    }

    input,
    textarea {
      box-sizing: border-box;
      width: 100%;
      padding: 12px 14px;
      color: #4a3a30;
      font: inherit;
      font-size: 17px;
      border: 1px solid #d9cfc3;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .choice-group {
      display: grid;
      gap: 8px;
    }

    .choice {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      padding: 10px 12px;
      border: 1px solid #d9cfc3;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
    }

    .choice input {
      width: auto;
      margin: 0;
      accent-color: #4a3a30;
    }

    .another-person {
      text-align: center;
    }

    .another-person p,
    .form-message {
      margin: 0 auto 12px;
      font-size: 17px;
      line-height: 1.4;
      text-align: center;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .primary-button,
    .secondary-button {
      padding: 12px 22px;
      color: white;
      font: inherit;
      font-size: 17px;
      border: 0;
      border-radius: 999px;
      background: #4a3a30;
      cursor: pointer;
    }

    .secondary-button {
      color: #4a3a30;
      border: 1px solid #d9cfc3;
      background: rgba(255, 255, 255, 0.62);
    }

    .primary-button:hover {
      background: #6b584c;
    }

    .secondary-button:hover {
      background: #efe7dd;
    }

    .form-message {
      display: none;
      max-width: 520px;
    }

    .form-message.is-visible {
      display: block;
    }

    @media (max-width: 600px) {
      .site-nav {
        gap: 3px;
        padding: 8px 6px;
      }

      .site-nav a {
        font-size: 12px;
        padding: 8px 7px;
      }

      .language-switch button {
        font-size: 12px;
        padding: 8px 6px;
      }

      .language-switch {
        margin-left: 2px;
      }

      .nav-separator {
        margin-left: 3px;
        line-height: 28px;
      }

      main {
        max-width: 300px;
        padding: 32px 10px;
      }

      h1 {
        font-size: 24px;
      }

      p {
        max-width: 260px;
        font-size: 13px;
      }

      .rsvp-form {
        gap: 18px;
      }

      .guest-section {
        gap: 14px;
        padding: 14px;
      }

      .guest-header h2 {
        font-size: 18px;
      }

      label,
      legend,
      input,
      textarea,
      .primary-button,
      .secondary-button,
      .another-person p,
      .form-message {
        font-size: 13px;
      }

      .choice {
        padding: 8px 10px;
      }
    }

    .lookup-box {
      display: grid;
      gap: 14px;
      max-width: 520px;
      margin: 0 auto 28px;
      padding: 22px;
      border: 1px solid #d9cfc3;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.55);
      text-align: left;
    }

    .lookup-box button {
      justify-self: center;
    }

    .group-title {
      margin: 0 0 18px;
      font-size: 26px;
      font-weight: 400;
      text-align: center;
    }

    .guest-selector {
      display: grid;
      gap: 12px;
    }

    .guest-select-card {
      padding: 14px;
      border: 1px solid #d9cfc3;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.55);
    }

    .guest-select-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      cursor: pointer;
    }

    .guest-select-label input {
      width: auto;
    }

    .hidden {
      display: none !important;
    }

  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <a href="index.html" data-i18n="navHome">Home</a>
    <a href="details.html" data-i18n="navDetails">Details</a>
    <a href="rsvp.html" aria-current="page">RSVP</a>
    <a href="gifts.html" data-i18n="navGifts">Gifts</a>
    <span class="nav-separator" aria-hidden="true">|</span>
    <span class="language-switch" aria-label="Language">
      <button type="button" data-lang="en" aria-pressed="true">🇬🇧 EN</button>
      <button type="button" data-lang="it" aria-pressed="false">🇮🇹 IT</button>
    </span>
  </nav>

  <main>
    <h1>RSVP</h1>

    <p data-i18n="rsvpIntro">
      Please let us know if you will be joining us by 01/06/2027.
    </p>

    <section class="lookup-box" id="lookup-box">
      <div>
        <label for="invitation-code" data-i18n="codeLabel">
          Invitation code
        </label>

        <input
          id="invitation-code"
          type="text"
          autocomplete="off"
          data-i18n-placeholder="codePlaceholder"
          placeholder="Enter your invitation code"
        />
      </div>

      <button
        class="primary-button"
        type="button"
        id="find-invitation"
        data-i18n="findInvitation"
      >
        Find invitation
      </button>

      <p class="form-message" id="lookup-message" role="status"></p>
    </section>

    <form class="rsvp-form hidden" id="rsvp-form">
      <h2 class="group-title" id="group-title"></h2>

      <fieldset>
        <legend data-i18n="selectGuests">
          Who are you responding for?
        </legend>

        <div class="guest-selector" id="guest-selector"></div>
      </fieldset>

      <div id="guest-list"></div>

      <div class="button-row">
        <button
          class="secondary-button"
          type="button"
          id="change-code"
          data-i18n="changeCode"
        >
          Use another code
        </button>

        <button
          class="primary-button"
          type="submit"
          data-i18n="submitRsvp"
        >
          Submit RSVP
        </button>
      </div>

      <p class="form-message" id="form-message" role="status"></p>
    </form>
  </main>
  <script>
    const GOOGLE_SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbySUrKA8C6ozeDAoEpvzbJiD7zeIaCH-vV2I9q1ubWoemEZ17ERTbsiSU_RlVxh5JIF/exec";

    let currentLanguage =
      localStorage.getItem("weddingLanguage") || "en";

    let currentGroup = null;
    let availableGuests = [];

    const translations = {
      en: {
        navHome: "Home",
        navDetails: "Details",
        navGifts: "Gifts",
        rsvpIntro:
          "Please let us know if you will be joining us by 01/06/2027.",
        codeLabel: "Invitation code",
        codePlaceholder: "Enter your invitation code",
        findInvitation: "Find invitation",
        selectGuests: "Who are you responding for?",
        changeCode: "Use another code",
        submitRsvp: "Submit RSVP",
        ceremonyLabel: "Will this guest attend the ceremony?",
        receptionLabel: "Will this guest attend the reception?",
        yesAttend: "Yes, will attend",
        noAttend: "No, cannot attend",
        foodLabel: "Food allergies or intolerances",
        foodPlaceholder:
          "Please list any allergies, intolerances, or dietary needs",
        songLabel: "Suggested song for the party",
        songPlaceholder: "Song title and artist",
        plusOneName: "Full name of your guest",
        searching: "Searching...",
        codeNotFound: "Invitation code not found.",
        codeRequired: "Please enter your invitation code.",
        selectAtLeastOne:
          "Please select at least one person to respond for.",
        sending: "Sending RSVP...",
        success: "Thank you. Your RSVP has been sent.",
        error: "Something went wrong. Please try again."
      },

      it: {
        navHome: "Home",
        navDetails: "Dettagli",
        navGifts: "Regali",
        rsvpIntro:
          "Fateci sapere se sarete con noi entro il 01/06/2027.",
        codeLabel: "Codice dell'invito",
        codePlaceholder: "Inserisci il codice dell'invito",
        findInvitation: "Trova invito",
        selectGuests: "Per chi vuoi confermare la presenza?",
        changeCode: "Usa un altro codice",
        submitRsvp: "Invia RSVP",
        ceremonyLabel:
          "Questa persona parteciperà alla cerimonia?",
        receptionLabel:
          "Questa persona parteciperà al ricevimento?",
        yesAttend: "Sì, parteciperà",
        noAttend: "No, non parteciperà",
        foodLabel: "Allergie o intolleranze alimentari",
        foodPlaceholder:
          "Indica eventuali allergie, intolleranze o esigenze alimentari",
        songLabel: "Canzone suggerita per la festa",
        songPlaceholder: "Titolo e artista",
        plusOneName: "Nome e cognome dell'accompagnatore",
        searching: "Ricerca in corso...",
        codeNotFound: "Codice dell'invito non trovato.",
        codeRequired: "Inserisci il codice dell'invito.",
        selectAtLeastOne:
          "Seleziona almeno una persona per cui rispondere.",
        sending: "Invio RSVP...",
        success: "Grazie. Il tuo RSVP è stato inviato.",
        error: "Qualcosa è andato storto. Riprova."
      }
    };

    function copy() {
      return translations[currentLanguage] || translations.en;
    }

    function applyLanguage(language) {
      currentLanguage = language;
      document.documentElement.lang = language;

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const value = copy()[element.dataset.i18n];
        if (value) element.textContent = value;
      });

      document
        .querySelectorAll("[data-i18n-placeholder]")
        .forEach((element) => {
          const value =
            copy()[element.dataset.i18nPlaceholder];

          if (value) element.placeholder = value;
        });

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.setAttribute(
          "aria-pressed",
          String(button.dataset.lang === language)
        );
      });

      localStorage.setItem("weddingLanguage", language);

      if (currentGroup) {
        renderGuestSelector();
      }
    }

    function showElementMessage(element, text) {
      element.textContent = text;
      element.classList.add("is-visible");
    }

    function hideElementMessage(element) {
      element.textContent = "";
      element.classList.remove("is-visible");
    }

    function lookupInvitation(code) {
      return new Promise((resolve, reject) => {
        const callbackName =
          "invitationCallback_" + Date.now();

        const script = document.createElement("script");

        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error("Lookup timed out."));
        }, 10000);

        function cleanup() {
          clearTimeout(timeout);
          script.remove();
          delete window[callbackName];
        }

        window[callbackName] = function (response) {
          cleanup();
          resolve(response);
        };

        script.onerror = function () {
          cleanup();
          reject(new Error("Could not contact RSVP service."));
        };

        const params = new URLSearchParams({
          action: "getGroup",
          code: code,
          callback: callbackName
        });

        script.src =
          GOOGLE_SCRIPT_URL + "?" + params.toString();

        document.body.appendChild(script);
      });
    }

    async function findInvitation() {
      const codeInput =
        document.querySelector("#invitation-code");

      const lookupMessage =
        document.querySelector("#lookup-message");

      const code = codeInput.value.trim().toUpperCase();

      hideElementMessage(lookupMessage);

      if (!code) {
        showElementMessage(
          lookupMessage,
          copy().codeRequired
        );
        return;
      }

      showElementMessage(
        lookupMessage,
        copy().searching
      );

      try {
        const response = await lookupInvitation(code);

        if (!response.ok) {
          throw new Error(
            response.error || copy().codeNotFound
          );
        }

        currentGroup = response.group;
        availableGuests = response.guests || [];

        document.querySelector("#group-title").textContent =
          currentGroup.groupName;

        document
          .querySelector("#lookup-box")
          .classList.add("hidden");

        document
          .querySelector("#rsvp-form")
          .classList.remove("hidden");

        renderGuestSelector();
        hideElementMessage(lookupMessage);
      } catch (error) {
        showElementMessage(
          lookupMessage,
          error.message || copy().codeNotFound
        );
      }
    }

    function isPlusOne(guest) {
      return String(guest.type || "")
        .trim()
        .toLowerCase() === "plus one";
    }

    function renderGuestSelector() {
      const selector =
        document.querySelector("#guest-selector");

      selector.innerHTML = "";

      availableGuests.forEach((guest) => {
        const card = document.createElement("div");
        card.className = "guest-select-card";

        const displayName = isPlusOne(guest)
          ? currentLanguage === "it"
            ? "Accompagnatore"
            : "Plus one"
          : guest.name;

        card.innerHTML = `
          <label class="guest-select-label">
            <input
              type="checkbox"
              data-select-guest
              value="${escapeHtml(guest.guestId)}"
            />
            <span>${escapeHtml(displayName)}</span>
          </label>
        `;

        selector.appendChild(card);
      });

      document.querySelector("#guest-list").innerHTML = "";
    }

    function createGuestForm(guest) {
      const section = document.createElement("section");
      section.className = "guest-section";
      section.dataset.guestId = guest.guestId;

      const plusOne = isPlusOne(guest);

      const heading = plusOne
        ? currentLanguage === "it"
          ? "Accompagnatore"
          : "Plus one"
        : guest.name;

      const nameField = plusOne
        ? `
          <div>
            <label for="name-${escapeHtml(guest.guestId)}">
              ${escapeHtml(copy().plusOneName)}
            </label>

            <input
              id="name-${escapeHtml(guest.guestId)}"
              data-guest-name
              type="text"
              required
            />
          </div>
        `
        : `
          <input
            data-guest-name
            type="hidden"
            value="${escapeHtml(guest.name)}"
          />
        `;

      section.innerHTML = `
        <div class="guest-header">
          <h2>${escapeHtml(heading)}</h2>
        </div>

        ${nameField}

        <fieldset>
          <legend>${escapeHtml(copy().ceremonyLabel)}</legend>

          <div class="choice-group">
            <label class="choice">
              <input
                type="radio"
                name="ceremony-${escapeHtml(guest.guestId)}"
                value="Yes"
                required
              />
              <span>${escapeHtml(copy().yesAttend)}</span>
            </label>

            <label class="choice">
              <input
                type="radio"
                name="ceremony-${escapeHtml(guest.guestId)}"
                value="No"
              />
              <span>${escapeHtml(copy().noAttend)}</span>
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>${escapeHtml(copy().receptionLabel)}</legend>

          <div class="choice-group">
            <label class="choice">
              <input
                type="radio"
                name="reception-${escapeHtml(guest.guestId)}"
                value="Yes"
                required
              />
              <span>${escapeHtml(copy().yesAttend)}</span>
            </label>

            <label class="choice">
              <input
                type="radio"
                name="reception-${escapeHtml(guest.guestId)}"
                value="No"
              />
              <span>${escapeHtml(copy().noAttend)}</span>
            </label>
          </div>
        </fieldset>

        <div>
          <label>${escapeHtml(copy().foodLabel)}</label>

          <textarea
            data-guest-food
            placeholder="${escapeHtml(copy().foodPlaceholder)}"
          ></textarea>
        </div>

        <div>
          <label>${escapeHtml(copy().songLabel)}</label>

          <input
            data-guest-song
            type="text"
            placeholder="${escapeHtml(copy().songPlaceholder)}"
          />
        </div>
      `;

      return section;
    }

    function updateSelectedGuests() {
      const guestList =
        document.querySelector("#guest-list");

      guestList.innerHTML = "";

      document
        .querySelectorAll("[data-select-guest]:checked")
        .forEach((checkbox) => {
          const guest = availableGuests.find(
            (item) => item.guestId === checkbox.value
          );

          if (guest) {
            guestList.appendChild(createGuestForm(guest));
          }
        });
    }

    function collectSelectedGuests() {
      return Array.from(
        document.querySelectorAll(".guest-section")
      ).map((section) => {
        const guestId = section.dataset.guestId;

        const invitedGuest = availableGuests.find(
          (guest) => guest.guestId === guestId
        );

        return {
          guestId: guestId,
          type: invitedGuest.type,
          name: section
            .querySelector("[data-guest-name]")
            .value.trim(),
          ceremony:
            section.querySelector(
              `input[name="ceremony-${CSS.escape(guestId)}"]:checked`
            )?.value || "",
          reception:
            section.querySelector(
              `input[name="reception-${CSS.escape(guestId)}"]:checked`
            )?.value || "",
          food: section
            .querySelector("[data-guest-food]")
            .value.trim(),
          song: section
            .querySelector("[data-guest-song]")
            .value.trim()
        };
      });
    }

    function resetLookup() {
      currentGroup = null;
      availableGuests = [];

      document.querySelector("#rsvp-form").reset();
      document.querySelector("#guest-selector").innerHTML = "";
      document.querySelector("#guest-list").innerHTML = "";
      document.querySelector("#group-title").textContent = "";
      document.querySelector("#invitation-code").value = "";

      document
        .querySelector("#rsvp-form")
        .classList.add("hidden");

      document
        .querySelector("#lookup-box")
        .classList.remove("hidden");

      document.querySelector("#invitation-code").focus();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.querySelectorAll("[data-lang]").forEach((button) => {
      button.addEventListener("click", () => {
        applyLanguage(button.dataset.lang);
      });
    });

    document
      .querySelector("#find-invitation")
      .addEventListener("click", findInvitation);

    document
      .querySelector("#invitation-code")
      .addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          findInvitation();
        }
      });

    document
      .querySelector("#guest-selector")
      .addEventListener("change", updateSelectedGuests);

    document
      .querySelector("#change-code")
      .addEventListener("click", resetLookup);

    document
      .querySelector("#rsvp-form")
      .addEventListener("submit", async (event) => {
        event.preventDefault();

        const message =
          document.querySelector("#form-message");

        hideElementMessage(message);

        const selectedGuests = collectSelectedGuests();

        if (selectedGuests.length === 0) {
          showElementMessage(
            message,
            copy().selectAtLeastOne
          );
          return;
        }

        if (!event.currentTarget.reportValidity()) {
          return;
        }

        showElementMessage(message, copy().sending);

        const payload = {
          groupCode: currentGroup.groupCode,
          language: currentLanguage,
          submittedAt: new Date().toISOString(),
          guests: selectedGuests
        };

        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify(payload)
          });

          event.currentTarget.reset();
          document.querySelector("#guest-list").innerHTML = "";

          showElementMessage(message, copy().success);
        } catch (error) {
          console.error(error);
          showElementMessage(message, copy().error);
        }
      });

    applyLanguage(currentLanguage);
  </script>
</body>
</html>
